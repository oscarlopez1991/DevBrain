# docker-compose.dev.yml: Development Overrides
#
# This file extends docker-compose.yml with development-specific settings.
# It's used with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Why separate files?
# - docker-compose.yml: Base configuration (works in production too)
# - docker-compose.dev.yml: Development extras (more ports, debug tools)
#
# For now, our base docker-compose.yml already works great for development.
# This override file is here for future use when we add:
# - Backend containerized development
# - Frontend containerized development
# - Debug ports for remote debugging
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

